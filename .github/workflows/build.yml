name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc make

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: can_monitor-${{ github.sha }}
          path: can_monitor.exe
